# go2rtc configuration
api:
  listen: "127.0.0.1:1984" # listen on localhost only for security
rtsp:
  listen: "0.0.0.0:8554"
webrtc:
  listen: "0.0.0.0:8555"
  candidates:
    - "stun:8555"
srtp:
  listen: "0.0.0.0:8443"
ffmpeg:
  bin: ffmpeg
  re: "-re -fflags nobuffer -flags low_delay -i {input}"
  hls_re: "-re -fflags nobuffer -flags low_delay -i {input}"
streams:
  # Replace with your actual Dom.ru / RTSP camera stream URL
  # "camera_id": "https://cctv-example.ertelecom.ru/hls/example/playlist.m3u8"
