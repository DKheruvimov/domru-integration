name: Build and Deploy to Cloud.ru VM

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Cloud.ru Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: dom-ru.cr.cloud.ru
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: dom-ru.cr.cloud.ru/yandex-domru-intercom-bridge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud.ru VM over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script: |
            echo "==== Logging in to cloud.ru Registry ===="
            docker login dom-ru.cr.cloud.ru -u "${{ secrets.REGISTRY_USERNAME }}" -p "${{ secrets.REGISTRY_PASSWORD }}"
            
            echo "==== Stopping old bridge container (if any) ===="
            # Stop both previous domru-bridge and yandex-domru-intercom-bridge containers to vacate port 3100
            docker stop domru-bridge yandex-domru-intercom-bridge || true
            docker rm domru-bridge yandex-domru-intercom-bridge || true
            
            echo "==== Pulling latest image ===="
            docker pull dom-ru.cr.cloud.ru/yandex-domru-intercom-bridge:latest
            
            echo "==== Launching new container ===="
            # We map port 3100 on the host to 3000 in the container, mount data volume for token persistence, and specify Yandex & Google DNS
            docker run -d \
              --name yandex-domru-intercom-bridge \
              --restart always \
              --dns 77.88.8.8 \
              --dns 8.8.8.8 \
              -p 3100:3000 \
              -v /home/denis/apps/domru-integration/data:/app/data \
              --log-opt max-size=10m --log-opt max-file=3 \
              dom-ru.cr.cloud.ru/yandex-domru-intercom-bridge:latest
            
            echo "==== Cleaning up dangling Docker images ===="
            docker image prune -f
            
            echo "==== Verification ===="
            docker ps | grep yandex-domru-intercom-bridge
