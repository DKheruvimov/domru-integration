server {
    # Nginx слушает стандартный HTTP порт. 
    # Cloudflare будет обращаться сюда по HTTP (если Flexible SSL) 
    # или по HTTPS (если Full SSL, тогда нужен блок listen 443 ssl)
    listen 80;
    
    # Замените на ваш домен
    server_name yourdomain.ru www.yourdomain.ru;

    # Основной прокси-блок
    location / {
        # Если проект в Docker запущен с пробросом 3100:3000, указываем 3100
        # Если порт 3000 занят и вы пробросили 3100:3000, Nginx отправляет запрос на 3100
        proxy_pass http://127.0.0.1:3100;
        
        # Передаем реальные IP-адреса и хосты
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Поддержка WebSocket (обязательно для go2rtc и HLS потоков, если используются вебсокеты)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Увеличиваем таймауты, так как потоковое видео может держать коннект
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Кэширование HLS потоков на стороне сервера (Опционально, если Cloudflare вдруг не справится)
    # По умолчанию мы делегируем это Cloudflare, поэтому этот блок не обязателен, 
    # но полезно иметь на случай локальных оптимизаций.
}
